name: Build PvZ Toolkit

on:
  push:
    branches: [master]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download FLTK
        shell: bash
        run: |
          curl -L -o fltk.zip "https://github.com/fltk/fltk/releases/download/fltk-1.4.0/fltk-1.4.0-release-x86.zip"
          unzip -q fltk.zip
          mv fltk-1.4.0-release fltk

      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake -G "NMake Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DFLTK_DIR="fltk/CMake" ^
            -S ..

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvztoolkit-exe
          path: build/pvztoolkit.exe
          retention-days: 30

      - name: Upload Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/pvztoolkit.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
